# Standalone frontend server for APIHarbor (split deploy).
# Serves the static Vite build and falls back to index.html for SPA routes.
# __PORT__ is replaced with Railway's $PORT by the container entrypoint.
server {
    listen       __PORT__;
    listen       [::]:__PORT__;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_types        text/plain text/css application/javascript application/json image/svg+xml application/wasm;

    # In the combined deploy the backend serves /runtime-ui-env.js. There is no
    # backend on this origin, so return an empty script — the app falls back to
    # the build-time VITE_* values (see src/config/env.ts).
    location = /runtime-ui-env.js {
        default_type application/javascript;
        add_header   Cache-Control "no-store";
        return 200 "";
    }

    # Content-hashed build assets are safe to cache forever.
    location /assets/ {
        expires    30d;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # index.html must never be cached so new deploys are picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # SPA fallback: any non-file route renders the app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
